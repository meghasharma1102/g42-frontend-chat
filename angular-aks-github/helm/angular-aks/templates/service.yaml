apiVersion: v1
kind: Service
metadata:
  name: {{ include "angular-aks.fullname" . }}
  labels:
    {{- include "angular-aks.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "angular-aks.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
