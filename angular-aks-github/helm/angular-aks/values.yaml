replicaCount: 1
revisionHistoryLimit: 3
progressDeadlineSeconds: 900
minReadySeconds: 0
terminationGracePeriodSeconds: 10

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

image:
  repository: ""
  tag: ""
  pullPolicy: Always

# imagePullSecrets: []
# Uncomment and set if AKS nodes do not have AcrPull role on the ACR.
# Example:
#   - name: acr-pull-secret
imagePullSecrets: []

service:
  type: LoadBalancer
  port: 80
  targetPort: 80

containerPort: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: angular.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

livenessProbe:
  path: /
  initialDelaySeconds: 30
  periodSeconds: 15

startupProbe:
  enabled: true
  path: /
  initialDelaySeconds: 0
  periodSeconds: 5
  failureThreshold: 24

readinessProbe:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 15
