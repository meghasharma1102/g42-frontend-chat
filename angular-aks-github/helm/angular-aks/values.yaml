replicaCount: 2

image:
  repository: acrdelphiaksdemo001.azurecr.io/angular-aks-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 80

containerPort: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: angular.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
